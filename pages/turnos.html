<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>642 APP — Turnos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main-content">
    <div id="topbar"></div>
    <div class="page-body">

      <div class="toolbar">
        <div class="search-box">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar fotógrafo...">
        </div>
        <div class="toolbar-right">
          <input type="month" id="filterMes" style="padding:8px 12px;background:#f0f0f0;border:1px solid transparent;font-family:inherit;font-size:13px;outline:none;">
          <button class="btn btn-primary" id="btnNuevo">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nuevo turno
          </button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Fotógrafo</th><th>Fecha</th><th>Hora inicio</th><th>Hora fin</th><th>Horas</th><th>Estado</th><th>Notas</th><th></th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Nuevo turno</h2>
      <button class="modal-close" onclick="UI.closeModal('modal')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Fotógrafo *</label>
        <select id="fFotografo"><option value="">Selecciona fotógrafo...</option></select>
        <span class="field-error" id="eFotografo"></span>
      </div>
      <div class="form-group">
        <label>Fecha *</label>
        <input type="date" id="fFecha">
        <span class="field-error" id="eFecha"></span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Hora inicio</label>
          <input type="time" id="fInicio" value="09:00">
        </div>
        <div class="form-group">
          <label>Hora fin</label>
          <input type="time" id="fFin" value="17:00">
        </div>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="fEstado">
          <option value="activo">Activo</option>
          <option value="libre">Libre</option>
          <option value="ausente">Ausente</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notas</label>
        <textarea id="fNotas" placeholder="Observaciones del turno..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="UI.closeModal('modal')">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar">Guardar</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initPage('turnos', 'Turnos');

  const now = new Date();
  document.getElementById('filterMes').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  function calcHours(ini, fin) {
    if (!ini || !fin) return '—';
    const [h1,m1] = ini.split(':').map(Number);
    const [h2,m2] = fin.split(':').map(Number);
    const diff = (h2*60+m2) - (h1*60+m1);
    if (diff <= 0) return '—';
    return `${Math.floor(diff/60)}h ${diff%60?diff%60+'m':''}`;
  }

  function loadUsers() {
    const users = JSON.parse(localStorage.getItem('642_users')||'[]');
    const sel = document.getElementById('fFotografo');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Selecciona fotógrafo...</option>' +
      users.map(u => `<option value="${u.username}" data-nombre="${u.nombre}">${u.nombre} (${u.rol})</option>`).join('');
    if (cur) sel.value = cur;
  }

  function render() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const mes    = document.getElementById('filterMes').value;
    const data   = DB.all('turnos').filter(t =>
      (!search || (t.nombre||t.fotografo).toLowerCase().includes(search)) &&
      (!mes    || t.fecha.startsWith(mes))
    ).sort((a,b) => b.fecha.localeCompare(a.fecha));

    const ESTADOS = { activo:'badge-green', libre:'badge-blue', ausente:'badge-red' };

    document.getElementById('tbody').innerHTML = data.length ? data.map(t => `<tr>
      <td><strong>${t.nombre||t.fotografo}</strong></td>
      <td>${UI.fmtDate(t.fecha)}</td>
      <td>${t.horaInicio||'—'}</td>
      <td>${t.horaFin||'—'}</td>
      <td>${calcHours(t.horaInicio, t.horaFin)}</td>
      <td><span class="badge ${ESTADOS[t.estado]||'badge-gray'}">${t.estado}</span></td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#888">${t.notas||'—'}</td>
      <td><div class="table-actions">
        <button class="btn btn-secondary btn-sm" onclick="editTurno(${t.id})">Editar</button>
        <button class="btn btn-danger btn-sm"    onclick="delTurno(${t.id})">Eliminar</button>
      </div></td>
    </tr>`).join('') : `<tr><td colspan="8"><div class="empty-state"><p>Sin turnos registrados</p></div></td></tr>`;
  }

  render();
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('filterMes').addEventListener('change', render);

  document.getElementById('btnNuevo').addEventListener('click', () => {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = 'Nuevo turno';
    UI.clearForm('modal');
    UI.setVal('fInicio','09:00'); UI.setVal('fFin','17:00'); UI.setVal('fEstado','activo');
    loadUsers();
    UI.openModal('modal');
  });

  document.getElementById('btnGuardar').addEventListener('click', () => {
    UI.clearErrors(['fFotografo','fFecha']);
    const selEl    = document.getElementById('fFotografo');
    const fotografo = selEl.value;
    const nombre    = selEl.options[selEl.selectedIndex]?.dataset.nombre || fotografo;
    const fecha     = UI.val('fFecha');
    let ok = true;
    if (!fotografo) { UI.markError('fFotografo','eFotografo','Selecciona un fotógrafo'); ok=false; }
    if (!fecha)     { UI.markError('fFecha','eFecha','Selecciona una fecha'); ok=false; }
    if (!ok) return;
    const data = { fotografo, nombre, fecha, horaInicio: UI.val('fInicio'), horaFin: UI.val('fFin'), estado: UI.val('fEstado'), notas: UI.val('fNotas') };
    const id = parseInt(document.getElementById('editId').value);
    if (id) { DB.update('turnos', id, data); UI.toast('Turno actualizado','','success'); }
    else    { DB.insert('turnos', data);     UI.toast('Turno registrado','','success'); }
    UI.closeModal('modal');
    render();
  });

  window.editTurno = id => {
    const t = DB.find('turnos', id);
    document.getElementById('editId').value = id;
    document.getElementById('modalTitle').textContent = 'Editar turno';
    loadUsers();
    UI.setVal('fFotografo', t.fotografo); UI.setVal('fFecha', t.fecha);
    UI.setVal('fInicio', t.horaInicio); UI.setVal('fFin', t.horaFin);
    UI.setVal('fEstado', t.estado); UI.setVal('fNotas', t.notas||'');
    UI.openModal('modal');
  };

  window.delTurno = id => {
    const t = DB.find('turnos', id);
    UI.confirm(`¿Eliminar el turno de "${t.nombre||t.fotografo}" del ${UI.fmtDate(t.fecha)}?`, () => {
      DB.remove('turnos', id);
      render();
      UI.toast('Turno eliminado','','info');
    });
  };
});
</script>
</body>
</html>
