<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>642 APP — Facturación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    @media print {
      .sidebar, .page-header, .toolbar, .modal-overlay, .toast, .confirm-dialog, .table-actions { display:none !important; }
      .app-layout { display:block; }
      .main-content { overflow:visible; }
      .receipt { display:block !important; }
    }
    .receipt { display:none; padding:40px; max-width:600px; margin:0 auto; font-size:13px; }
    .receipt-logo { font-weight:800; font-size:22px; margin-bottom:4px; }
    .receipt-logo span { background:#111; color:#fff; padding:3px 8px; margin-right:4px; }
    .receipt table { width:100%; border-collapse:collapse; margin-top:16px; }
    .receipt table td, .receipt table th { padding:8px; border-bottom:1px solid #eee; }
    .receipt table th { font-size:11px; color:#888; text-transform:uppercase; }
    .receipt-total { font-size:18px; font-weight:700; text-align:right; margin-top:16px; }
    .receipt-footer { margin-top:24px; font-size:11px; color:#888; text-align:center; border-top:1px solid #eee; padding-top:16px; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main-content">
    <div id="topbar"></div>
    <div class="page-body">

      <!-- Métricas -->
      <div class="metric-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
        <div class="metric-card"><div class="metric-label">Total facturado</div><div class="metric-value" id="mTotal">—</div></div>
        <div class="metric-card"><div class="metric-label">Pendiente de cobro</div><div class="metric-value" id="mPendiente" style="color:#f57c00">—</div></div>
        <div class="metric-card"><div class="metric-label">Facturas emitidas</div><div class="metric-value" id="mCount">—</div></div>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar factura o cliente...">
        </div>
        <div class="toolbar-right">
          <select id="filterEstado" style="padding:8px 12px;background:#f0f0f0;border:1px solid transparent;font-family:inherit;font-size:13px;outline:none;cursor:pointer">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="pagada">Pagada</option>
            <option value="cancelada">Cancelada</option>
          </select>
          <button class="btn btn-primary" id="btnNueva">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nueva factura
          </button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Número</th><th>Cliente</th><th>Concepto</th><th>Fecha</th><th>Monto</th><th>Estado</th><th></th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Recibo (para imprimir) -->
<div class="receipt" id="receipt">
  <div class="receipt-logo"><span>6/42</span> APP</div>
  <div style="font-size:12px;color:#888;margin-bottom:20px">642 Studio · Sistema de Gestión</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div><div style="font-size:11px;color:#888">Factura N°</div><div id="rNumero" style="font-weight:700;font-size:16px"></div></div>
    <div><div style="font-size:11px;color:#888">Fecha</div><div id="rFecha"></div></div>
    <div><div style="font-size:11px;color:#888">Cliente</div><div id="rCliente" style="font-weight:600"></div></div>
    <div><div style="font-size:11px;color:#888">Estado</div><div id="rEstado"></div></div>
  </div>
  <table>
    <thead><tr><th style="text-align:left">Concepto</th><th style="text-align:right">Monto</th></tr></thead>
    <tbody><tr><td id="rConcepto"></td><td id="rMonto" style="text-align:right;font-weight:600"></td></tr></tbody>
  </table>
  <div class="receipt-total">Total: <span id="rTotal"></span></div>
  <div class="receipt-footer">Gracias por su preferencia · 642 Studio</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Nueva factura</h2>
      <button class="modal-close" onclick="UI.closeModal('modal')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label>Número de factura *</label>
          <input type="text" id="fNumero" placeholder="FAC-001">
          <span class="field-error" id="eNumero"></span>
        </div>
        <div class="form-group">
          <label>Fecha *</label>
          <input type="date" id="fFecha">
          <span class="field-error" id="eFecha"></span>
        </div>
      </div>
      <div class="form-group">
        <label>Cliente *</label>
        <select id="fCliente"><option value="">Selecciona cliente...</option></select>
        <span class="field-error" id="eCliente"></span>
      </div>
      <div class="form-group">
        <label>Concepto *</label>
        <input type="text" id="fConcepto" placeholder="Ej. Sesión fotográfica retrato">
        <span class="field-error" id="eConcepto"></span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Monto ($) *</label>
          <input type="number" id="fMonto" placeholder="0.00" min="0" step="0.01">
          <span class="field-error" id="eMonto"></span>
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select id="fEstado">
            <option value="pendiente">Pendiente</option>
            <option value="pagada">Pagada</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Notas</label>
        <textarea id="fNotas" placeholder="Notas adicionales..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="UI.closeModal('modal')">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar">Guardar</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initPage('facturacion', 'Facturación');

  const ESTADOS = { pagada:'badge-green', pendiente:'badge-orange', cancelada:'badge-red' };

  function updateMetrics() {
    const all = DB.all('facturas');
    const pagadas   = all.filter(f => f.estado==='pagada').reduce((s,f) => s+(f.monto||0), 0);
    const pendiente = all.filter(f => f.estado==='pendiente').reduce((s,f) => s+(f.monto||0), 0);
    document.getElementById('mTotal').textContent    = UI.fmtCurrency(pagadas);
    document.getElementById('mPendiente').textContent = UI.fmtCurrency(pendiente);
    document.getElementById('mCount').textContent    = all.length;
  }

  function render() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const estado = document.getElementById('filterEstado').value;
    const data   = DB.all('facturas').filter(f =>
      (!search || f.numero.toLowerCase().includes(search) || (f.clienteNombre||'').toLowerCase().includes(search) || (f.concepto||'').toLowerCase().includes(search)) &&
      (!estado || f.estado === estado)
    ).sort((a,b) => b.fecha?.localeCompare(a.fecha));
    updateMetrics();
    document.getElementById('tbody').innerHTML = data.length ? data.map(f => `<tr>
      <td><strong>${f.numero}</strong></td>
      <td>${f.clienteNombre||'—'}</td>
      <td>${f.concepto||'—'}</td>
      <td>${UI.fmtDate(f.fecha)}</td>
      <td><strong>${UI.fmtCurrency(f.monto||0)}</strong></td>
      <td><span class="badge ${ESTADOS[f.estado]||'badge-gray'}">${f.estado}</span></td>
      <td><div class="table-actions">
        <button class="btn btn-secondary btn-sm" onclick="printReceipt(${f.id})">Imprimir</button>
        <button class="btn btn-secondary btn-sm" onclick="editFactura(${f.id})">Editar</button>
        <button class="btn btn-danger btn-sm"    onclick="delFactura(${f.id})">Eliminar</button>
      </div></td>
    </tr>`).join('') : `<tr><td colspan="7"><div class="empty-state"><p>Sin facturas emitidas</p></div></td></tr>`;
  }

  render();
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('filterEstado').addEventListener('change', render);

  function loadClientes() {
    const sel = document.getElementById('fCliente');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Selecciona cliente...</option>' +
      DB.all('clientes').map(c => `<option value="${c.id}" data-nombre="${c.nombre}">${c.nombre}</option>`).join('');
    if (cur) sel.value = cur;
  }

  function nextNumero() {
    const all = DB.all('facturas');
    const nums = all.map(f => parseInt((f.numero||'').replace(/\D/g,''))||0);
    const next = (nums.length ? Math.max(...nums) : 0) + 1;
    return `FAC-${String(next).padStart(3,'0')}`;
  }

  document.getElementById('btnNueva').addEventListener('click', () => {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = 'Nueva factura';
    UI.clearForm('modal');
    UI.setVal('fNumero', nextNumero());
    UI.setVal('fFecha', new Date().toISOString().split('T')[0]);
    UI.setVal('fEstado','pendiente');
    loadClientes();
    UI.openModal('modal');
  });

  document.getElementById('btnGuardar').addEventListener('click', () => {
    UI.clearErrors(['fNumero','fFecha','fCliente','fConcepto','fMonto']);
    const numero    = UI.val('fNumero');
    const fecha     = UI.val('fFecha');
    const clienteId = parseInt(UI.val('fCliente'));
    const concepto  = UI.val('fConcepto');
    const monto     = parseFloat(UI.val('fMonto'));
    let ok = true;
    if (!numero)        { UI.markError('fNumero','eNumero','Ingresa el número'); ok=false; }
    if (!fecha)         { UI.markError('fFecha','eFecha','Selecciona la fecha'); ok=false; }
    if (!clienteId)     { UI.markError('fCliente','eCliente','Selecciona cliente'); ok=false; }
    if (!concepto)      { UI.markError('fConcepto','eConcepto','Ingresa el concepto'); ok=false; }
    if (isNaN(monto))   { UI.markError('fMonto','eMonto','Ingresa el monto'); ok=false; }
    if (!ok) return;

    const sel = document.getElementById('fCliente');
    const clienteNombre = sel.options[sel.selectedIndex].dataset.nombre;
    const data = { numero, fecha, clienteId, clienteNombre, concepto, monto, estado: UI.val('fEstado'), notas: UI.val('fNotas') };
    const id = parseInt(document.getElementById('editId').value);
    if (id) { DB.update('facturas', id, data); UI.toast('Factura actualizada','','success'); }
    else    { DB.insert('facturas', data);     UI.toast('Factura creada','','success'); }
    UI.closeModal('modal');
    render();
  });

  window.editFactura = id => {
    const f = DB.find('facturas', id);
    document.getElementById('editId').value = id;
    document.getElementById('modalTitle').textContent = 'Editar factura';
    loadClientes();
    UI.setVal('fNumero', f.numero); UI.setVal('fFecha', f.fecha);
    UI.setVal('fCliente', f.clienteId); UI.setVal('fConcepto', f.concepto);
    UI.setVal('fMonto', f.monto); UI.setVal('fEstado', f.estado);
    UI.setVal('fNotas', f.notas||'');
    UI.openModal('modal');
  };

  window.delFactura = id => {
    const f = DB.find('facturas', id);
    UI.confirm(`¿Eliminar la factura ${f.numero}?`, () => {
      DB.remove('facturas', id);
      render();
      UI.toast('Factura eliminada','','info');
    });
  };

  window.printReceipt = id => {
    const f = DB.find('facturas', id);
    document.getElementById('rNumero').textContent  = f.numero;
    document.getElementById('rFecha').textContent   = UI.fmtDate(f.fecha);
    document.getElementById('rCliente').textContent = f.clienteNombre||'—';
    document.getElementById('rEstado').textContent  = f.estado;
    document.getElementById('rConcepto').textContent = f.concepto;
    document.getElementById('rMonto').textContent   = UI.fmtCurrency(f.monto||0);
    document.getElementById('rTotal').textContent   = UI.fmtCurrency(f.monto||0);
    window.print();
  };
});
</script>
</body>
</html>
