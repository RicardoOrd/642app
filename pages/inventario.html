<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>642 APP — Inventario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main-content">
    <div id="topbar"></div>
    <div class="page-body">

      <!-- Métricas -->
      <div class="metric-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
        <div class="metric-card"><div class="metric-label">Total productos</div><div class="metric-value" id="mTotal">—</div></div>
        <div class="metric-card"><div class="metric-label">Stock bajo (&lt;3)</div><div class="metric-value" id="mBajo" style="color:#f57c00">—</div></div>
        <div class="metric-card"><div class="metric-label">Valor total</div><div class="metric-value" id="mValor">—</div></div>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar producto...">
        </div>
        <div class="toolbar-right">
          <select id="filterCat" style="padding:8px 12px;background:#f0f0f0;border:1px solid transparent;font-family:inherit;font-size:13px;outline:none;cursor:pointer">
            <option value="">Todas las categorías</option>
            <option>Cámara</option><option>Lente</option><option>Iluminación</option>
            <option>Accesorio</option><option>Fondo</option><option>Otro</option>
          </select>
          <button class="btn btn-primary" id="btnNuevo">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Agregar producto
          </button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Producto</th><th>Categoría</th><th>Stock</th><th>Precio unit.</th><th>Valor total</th><th></th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Nuevo producto</h2>
      <button class="modal-close" onclick="UI.closeModal('modal')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Nombre del producto *</label>
        <input type="text" id="fNombre" placeholder="Ej. Cámara Sony A7 III">
        <span class="field-error" id="eNombre"></span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Categoría</label>
          <select id="fCat">
            <option value="">Sin categoría</option>
            <option>Cámara</option><option>Lente</option><option>Iluminación</option>
            <option>Accesorio</option><option>Fondo</option><option>Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Stock *</label>
          <input type="number" id="fStock" value="1" min="0">
          <span class="field-error" id="eStock"></span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Precio unitario ($)</label>
          <input type="number" id="fPrecio" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Ubicación</label>
          <input type="text" id="fUbicacion" placeholder="Ej. Estante A">
        </div>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea id="fDesc" placeholder="Descripción del producto..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="UI.closeModal('modal')">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardar">Guardar</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initPage('inventario', 'Inventario');

  function updateMetrics() {
    const all = DB.all('inventario');
    document.getElementById('mTotal').textContent = all.length;
    document.getElementById('mBajo').textContent  = all.filter(p => p.stock < 3).length;
    document.getElementById('mValor').textContent = UI.fmtCurrency(all.reduce((s,p) => s + (p.precio||0)*(p.stock||0), 0));
  }

  function render() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cat    = document.getElementById('filterCat').value;
    const data   = DB.all('inventario').filter(p =>
      (!search || p.nombre.toLowerCase().includes(search) || (p.categoria||'').toLowerCase().includes(search)) &&
      (!cat    || p.categoria === cat)
    );
    updateMetrics();
    document.getElementById('tbody').innerHTML = data.length ? data.map(p => {
      const stockBadge = p.stock < 1 ? 'badge-red' : p.stock < 3 ? 'badge-orange' : 'badge-green';
      return `<tr>
        <td><strong>${p.nombre}</strong>${p.descripcion?`<br><span style="font-size:11px;color:#888">${p.descripcion}</span>`:''}</td>
        <td>${p.categoria ? `<span class="badge badge-gray">${p.categoria}</span>` : '—'}</td>
        <td><span class="badge ${stockBadge}">${p.stock} uds.</span></td>
        <td>${p.precio ? UI.fmtCurrency(p.precio) : '—'}</td>
        <td>${p.precio ? UI.fmtCurrency((p.precio||0)*(p.stock||0)) : '—'}</td>
        <td><div class="table-actions">
          <button class="btn btn-secondary btn-sm" onclick="editItem(${p.id})">Editar</button>
          <button class="btn btn-danger btn-sm"    onclick="delItem(${p.id})">Eliminar</button>
        </div></td>
      </tr>`;
    }).join('') : `<tr><td colspan="6"><div class="empty-state"><p>Sin productos en inventario</p>
      <button class="btn btn-primary" onclick="document.getElementById('btnNuevo').click()">Agregar producto</button></div></td></tr>`;
  }

  render();
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('filterCat').addEventListener('change', render);

  document.getElementById('btnNuevo').addEventListener('click', () => {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = 'Nuevo producto';
    UI.clearForm('modal');
    UI.setVal('fStock', '1');
    UI.openModal('modal');
  });

  document.getElementById('btnGuardar').addEventListener('click', () => {
    UI.clearErrors(['fNombre','fStock']);
    const nombre = UI.val('fNombre');
    const stock  = parseInt(UI.val('fStock'));
    let ok = true;
    if (!nombre)      { UI.markError('fNombre','eNombre','El nombre es requerido'); ok=false; }
    if (isNaN(stock)) { UI.markError('fStock','eStock','Ingresa el stock'); ok=false; }
    if (!ok) return;
    const data = { nombre, categoria: UI.val('fCat'), stock, precio: parseFloat(UI.val('fPrecio'))||0, ubicacion: UI.val('fUbicacion'), descripcion: UI.val('fDesc') };
    const id = parseInt(document.getElementById('editId').value);
    if (id) { DB.update('inventario', id, data); UI.toast('Producto actualizado','','success'); }
    else    { DB.insert('inventario', data);     UI.toast('Producto agregado','','success'); }
    UI.closeModal('modal');
    render();
  });

  window.editItem = id => {
    const p = DB.find('inventario', id);
    document.getElementById('editId').value = id;
    document.getElementById('modalTitle').textContent = 'Editar producto';
    UI.setVal('fNombre', p.nombre); UI.setVal('fCat', p.categoria||'');
    UI.setVal('fStock', p.stock);   UI.setVal('fPrecio', p.precio||'');
    UI.setVal('fUbicacion', p.ubicacion||''); UI.setVal('fDesc', p.descripcion||'');
    UI.openModal('modal');
  };

  window.delItem = id => {
    const p = DB.find('inventario', id);
    UI.confirm(`¿Eliminar "${p.nombre}" del inventario?`, () => {
      DB.remove('inventario', id);
      render();
      UI.toast('Producto eliminado','','info');
    });
  };
});
</script>
</body>
</html>
